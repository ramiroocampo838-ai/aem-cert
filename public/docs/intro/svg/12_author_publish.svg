<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" width="680" height="460">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Author vs Publish</text>
  <text class="subtitle" x="40" y="60">Two environments separating content creation from delivery</text>

  <g class="c-purple">
    <rect x="40" y="90" width="240" height="120" rx="8"/>
    <text class="th" x="160" y="116" text-anchor="middle">Author</text>
    <text class="ts" x="160" y="140" text-anchor="middle">Where content is</text>
    <text class="ts" x="160" y="156" text-anchor="middle">created and managed</text>
    <text class="ts" x="160" y="180" text-anchor="middle">Internal use only</text>
    <text class="ts" x="160" y="196" text-anchor="middle">(authors and editors)</text>
  </g>

  <line x1="280" y1="150" x2="368" y2="150" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="324" y="138" text-anchor="middle">Replication</text>

  <g class="c-teal">
    <rect x="370" y="90" width="240" height="120" rx="8"/>
    <text class="th" x="490" y="116" text-anchor="middle">Publish</text>
    <text class="ts" x="490" y="140" text-anchor="middle">Where content is</text>
    <text class="ts" x="490" y="156" text-anchor="middle">delivered to end users</text>
    <text class="ts" x="490" y="180" text-anchor="middle">Public-facing</text>
    <text class="ts" x="490" y="196" text-anchor="middle">(visitors)</text>
  </g>

  <line x1="40" y1="240" x2="640" y2="240" class="divider"/>

  <text class="title" x="40" y="270">In front of Publish: the Dispatcher</text>

  <g class="c-teal">
    <rect x="40" y="300" width="160" height="80" rx="8"/>
    <text class="th" x="120" y="326" text-anchor="middle">Publish</text>
    <text class="ts" x="120" y="352" text-anchor="middle">Generates pages</text>
  </g>

  <line x1="200" y1="340" x2="238" y2="340" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="240" y="300" width="200" height="80" rx="8"/>
    <text class="th" x="340" y="326" text-anchor="middle">Dispatcher</text>
    <text class="ts" x="340" y="350" text-anchor="middle">Caching, performance,</text>
    <text class="ts" x="340" y="366" text-anchor="middle">security layer</text>
  </g>

  <line x1="440" y1="340" x2="478" y2="340" class="arr" marker-end="url(#arrow)"/>

  <g class="c-gray">
    <rect x="480" y="300" width="160" height="80" rx="8"/>
    <text class="th" x="560" y="326" text-anchor="middle">End user</text>
    <text class="ts" x="560" y="352" text-anchor="middle">Browser request</text>
  </g>

  <text class="ts" x="40" y="420">The Dispatcher is the first thing visitors hit, protecting Publish from heavy load.</text>

</svg>
