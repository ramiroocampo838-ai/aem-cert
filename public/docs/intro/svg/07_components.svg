<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" width="680" height="480">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Components: the building blocks</text>
  <text class="subtitle" x="40" y="60">Think of them as LEGO pieces that authors combine into pages</text>

  <text class="th" x="40" y="100">Anatomy of a component</text>

  <g class="c-purple">
    <rect x="40" y="120" width="600" height="160" rx="8"/>
    <text class="th" x="340" y="142" text-anchor="middle">Component</text>
  </g>

  <g class="c-teal">
    <rect x="60" y="160" width="140" height="100" rx="8"/>
    <text class="th" x="130" y="184" text-anchor="middle">Definition</text>
    <text class="ts" x="130" y="206" text-anchor="middle">resourceType,</text>
    <text class="ts" x="130" y="220" text-anchor="middle">name,</text>
    <text class="ts" x="130" y="234" text-anchor="middle">metadata</text>
  </g>

  <g class="c-coral">
    <rect x="220" y="160" width="140" height="100" rx="8"/>
    <text class="th" x="290" y="184" text-anchor="middle">HTL template</text>
    <text class="ts" x="290" y="206" text-anchor="middle">HTML markup</text>
    <text class="ts" x="290" y="220" text-anchor="middle">that renders</text>
    <text class="ts" x="290" y="234" text-anchor="middle">the output</text>
  </g>

  <g class="c-amber">
    <rect x="380" y="160" width="140" height="100" rx="8"/>
    <text class="th" x="450" y="184" text-anchor="middle">Author dialog</text>
    <text class="ts" x="450" y="206" text-anchor="middle">Form authors</text>
    <text class="ts" x="450" y="220" text-anchor="middle">use to fill in</text>
    <text class="ts" x="450" y="234" text-anchor="middle">content</text>
  </g>

  <g class="c-blue">
    <rect x="540" y="160" width="80" height="100" rx="8"/>
    <text class="th" x="580" y="184" text-anchor="middle">CSS / JS</text>
    <text class="ts" x="580" y="206" text-anchor="middle">Styles</text>
    <text class="ts" x="580" y="220" text-anchor="middle">and client</text>
    <text class="ts" x="580" y="234" text-anchor="middle">behavior</text>
  </g>

  <line x1="40" y1="310" x2="640" y2="310" class="divider"/>

  <text class="title" x="40" y="340">HTL: HTML Template Language</text>

  <g class="c-green">
    <rect x="40" y="360" width="280" height="84" rx="8"/>
    <text class="th" x="180" y="384" text-anchor="middle">Modern standard</text>
    <text class="ts" x="180" y="404" text-anchor="middle">Secure by default</text>
    <text class="ts" x="180" y="420" text-anchor="middle">Protects against XSS</text>
    <text class="ts" x="180" y="436" text-anchor="middle">Replaces older JSP</text>
  </g>

  <g class="c-blue">
    <rect x="360" y="360" width="280" height="84" rx="8"/>
    <text class="th" x="500" y="384" text-anchor="middle">Core Components</text>
    <text class="ts" x="500" y="404" text-anchor="middle">Ready-to-use components</text>
    <text class="ts" x="500" y="420" text-anchor="middle">maintained by Adobe,</text>
    <text class="ts" x="500" y="436" text-anchor="middle">production-quality</text>
  </g>

</svg>
