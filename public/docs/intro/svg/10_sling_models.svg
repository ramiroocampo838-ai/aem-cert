<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" width="680" height="460">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Sling Models</text>
  <text class="subtitle" x="40" y="60">Java classes that pull data from JCR cleanly, using annotations</text>

  <g class="c-coral">
    <rect x="40" y="90" width="160" height="80" rx="8"/>
    <text class="th" x="120" y="116" text-anchor="middle">JCR resource</text>
    <text class="ts" x="120" y="138" text-anchor="middle">Properties,</text>
    <text class="ts" x="120" y="154" text-anchor="middle">child nodes</text>
  </g>

  <line x1="210" y1="130" x2="278" y2="130" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="244" y="120" text-anchor="middle">injects</text>

  <g class="c-purple">
    <rect x="290" y="90" width="160" height="80" rx="8"/>
    <text class="th" x="370" y="116" text-anchor="middle">Sling Model</text>
    <text class="ts" x="370" y="138" text-anchor="middle">Java class with</text>
    <text class="ts" x="370" y="154" text-anchor="middle">annotations</text>
  </g>

  <line x1="460" y1="130" x2="528" y2="130" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="494" y="120" text-anchor="middle">used by</text>

  <g class="c-teal">
    <rect x="540" y="90" width="100" height="80" rx="8"/>
    <text class="th" x="590" y="116" text-anchor="middle">HTL template</text>
    <text class="ts" x="590" y="138" text-anchor="middle">Renders</text>
    <text class="ts" x="590" y="154" text-anchor="middle">final HTML</text>
  </g>

  <line x1="40" y1="200" x2="640" y2="200" class="divider"/>

  <text class="title" x="40" y="230">Key annotations</text>

  <g class="c-amber">
    <rect x="40" y="250" width="290" height="64" rx="8"/>
    <text class="th" x="185" y="274" text-anchor="middle">@ValueMapValue</text>
    <text class="ts" x="185" y="296" text-anchor="middle">Injects properties from the resource</text>
  </g>

  <g class="c-amber">
    <rect x="350" y="250" width="290" height="64" rx="8"/>
    <text class="th" x="495" y="274" text-anchor="middle">@ChildResource</text>
    <text class="ts" x="495" y="296" text-anchor="middle">Injects child nodes</text>
  </g>

  <g class="c-amber">
    <rect x="40" y="324" width="290" height="64" rx="8"/>
    <text class="th" x="185" y="348" text-anchor="middle">@OSGiService</text>
    <text class="ts" x="185" y="370" text-anchor="middle">Injects an OSGi service</text>
  </g>

  <g class="c-amber">
    <rect x="350" y="324" width="290" height="64" rx="8"/>
    <text class="th" x="495" y="348" text-anchor="middle">@PostConstruct</text>
    <text class="ts" x="495" y="370" text-anchor="middle">Initialization logic after injection</text>
  </g>

  <text class="ts" x="40" y="420">Sling Models keep templates clean: no business logic in views.</text>

</svg>
