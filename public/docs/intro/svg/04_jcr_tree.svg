<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" width="680" height="480">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">JCR is a tree</text>
  <text class="subtitle" x="40" y="60">Like a file system: everything hangs from the root "/"</text>

  <g class="c-gray">
    <rect x="280" y="80" width="120" height="44" rx="8"/>
    <text class="th" x="340" y="100" text-anchor="middle">/</text>
    <text class="ts" x="340" y="116" text-anchor="middle">Root</text>
  </g>

  <path d="M340 124 L340 150 L90 150 L90 170" stroke="#888780" stroke-width="0.5" fill="none"/>
  <path d="M340 150 L210 150 L210 170" stroke="#888780" stroke-width="0.5" fill="none"/>
  <path d="M340 150 L340 170" stroke="#888780" stroke-width="0.5" fill="none"/>
  <path d="M340 150 L470 150 L470 170" stroke="#888780" stroke-width="0.5" fill="none"/>
  <path d="M340 150 L590 150 L590 170" stroke="#888780" stroke-width="0.5" fill="none"/>

  <g class="c-teal">
    <rect x="40" y="170" width="100" height="60" rx="8"/>
    <text class="th" x="90" y="192" text-anchor="middle">/content</text>
    <text class="ts" x="90" y="210" text-anchor="middle">Site pages</text>
  </g>

  <g class="c-purple">
    <rect x="160" y="170" width="100" height="60" rx="8"/>
    <text class="th" x="210" y="192" text-anchor="middle">/apps</text>
    <text class="ts" x="210" y="210" text-anchor="middle">Your code</text>
  </g>

  <g class="c-red">
    <rect x="280" y="170" width="120" height="60" rx="8"/>
    <text class="th" x="340" y="192" text-anchor="middle">/libs</text>
    <text class="ts" x="340" y="210" text-anchor="middle">Do not modify</text>
  </g>

  <g class="c-amber">
    <rect x="420" y="170" width="100" height="60" rx="8"/>
    <text class="th" x="470" y="192" text-anchor="middle">/conf</text>
    <text class="ts" x="470" y="210" text-anchor="middle">Configuration</text>
  </g>

  <g class="c-gray">
    <rect x="540" y="170" width="100" height="60" rx="8"/>
    <text class="th" x="590" y="192" text-anchor="middle">/var</text>
    <text class="ts" x="590" y="210" text-anchor="middle">Runtime data</text>
  </g>

  <line x1="40" y1="270" x2="640" y2="270" class="divider"/>

  <text class="title" x="40" y="300">Inside /content</text>
  <text class="subtitle" x="40" y="318">Each page has a special node called jcr:content with its properties</text>

  <g class="c-teal">
    <rect x="40" y="340" width="160" height="44" rx="8"/>
    <text class="th" x="120" y="368" text-anchor="middle">/content</text>
  </g>
  <line x1="120" y1="384" x2="120" y2="410" stroke="#888780" stroke-width="0.5"/>

  <g class="c-teal">
    <rect x="40" y="410" width="160" height="44" rx="8"/>
    <text class="th" x="120" y="438" text-anchor="middle">/mysite/en</text>
  </g>
  <line x1="200" y1="432" x2="240" y2="432" class="arr" marker-end="url(#arrow)" stroke="#888780"/>

  <g class="c-coral">
    <rect x="240" y="410" width="180" height="44" rx="8"/>
    <text class="th" x="330" y="438" text-anchor="middle">jcr:content</text>
  </g>

  <text class="ts" x="440" y="430">Holds title, template,</text>
  <text class="ts" x="440" y="446">components and properties</text>

</svg>
