<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" width="680" height="480">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">What is Adobe Experience Manager?</text>
  <text class="subtitle" x="40" y="60">An enterprise CMS to manage and deliver digital experiences</text>

  <g class="c-gray">
    <rect x="220" y="90" width="240" height="56" rx="8"/>
    <text class="th" x="340" y="112" text-anchor="middle">AEM</text>
    <text class="ts" x="340" y="130" text-anchor="middle">Enterprise content platform</text>
  </g>

  <text class="th" x="40" y="190">Four main pillars</text>

  <g class="c-teal">
    <rect x="40" y="210" width="140" height="64" rx="8"/>
    <text class="th" x="110" y="234" text-anchor="middle">Web content</text>
    <text class="ts" x="110" y="252" text-anchor="middle">Pages and sites</text>
    <text class="ts" x="110" y="266" text-anchor="middle">across channels</text>
  </g>

  <g class="c-purple">
    <rect x="190" y="210" width="140" height="64" rx="8"/>
    <text class="th" x="260" y="234" text-anchor="middle">Digital assets</text>
    <text class="ts" x="260" y="252" text-anchor="middle">Images, videos,</text>
    <text class="ts" x="260" y="266" text-anchor="middle">documents</text>
  </g>

  <g class="c-coral">
    <rect x="340" y="210" width="140" height="64" rx="8"/>
    <text class="th" x="410" y="234" text-anchor="middle">Forms</text>
    <text class="ts" x="410" y="252" text-anchor="middle">Customer-facing</text>
    <text class="ts" x="410" y="266" text-anchor="middle">data capture</text>
  </g>

  <g class="c-amber">
    <rect x="490" y="210" width="150" height="64" rx="8"/>
    <text class="th" x="565" y="234" text-anchor="middle">Marketing tools</text>
    <text class="ts" x="565" y="252" text-anchor="middle">Personalization</text>
    <text class="ts" x="565" y="266" text-anchor="middle">and campaigns</text>
  </g>

  <line x1="40" y1="310" x2="640" y2="310" class="divider"/>

  <text class="th" x="40" y="340">Part of Adobe Experience Cloud</text>
  <text class="ts" x="40" y="358">Integrates with tools like Analytics and Target</text>

  <text class="th" x="40" y="395">Common industries</text>
  <g class="c-gray">
    <rect x="40" y="410" width="120" height="44" rx="8"/>
    <text class="th" x="100" y="438" text-anchor="middle">Banking</text>
  </g>
  <g class="c-gray">
    <rect x="170" y="410" width="120" height="44" rx="8"/>
    <text class="th" x="230" y="438" text-anchor="middle">Retail</text>
  </g>
  <g class="c-gray">
    <rect x="300" y="410" width="140" height="44" rx="8"/>
    <text class="th" x="370" y="438" text-anchor="middle">Healthcare</text>
  </g>
  <g class="c-gray">
    <rect x="450" y="410" width="140" height="44" rx="8"/>
    <text class="th" x="520" y="438" text-anchor="middle">Government</text>
  </g>

</svg>
