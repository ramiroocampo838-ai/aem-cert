<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" width="680" height="460">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">OSGi: the service container</text>
  <text class="subtitle" x="40" y="60">Where business logic lives, organized in modules called bundles</text>

  <g class="c-purple">
    <rect x="40" y="90" width="600" height="120" rx="8"/>
    <text class="th" x="340" y="112" text-anchor="middle">OSGi container</text>
  </g>

  <g class="c-teal">
    <rect x="60" y="135" width="140" height="60" rx="8"/>
    <text class="th" x="130" y="158" text-anchor="middle">Bundle A</text>
    <text class="ts" x="130" y="176" text-anchor="middle">Custom service</text>
  </g>

  <g class="c-teal">
    <rect x="220" y="135" width="140" height="60" rx="8"/>
    <text class="th" x="290" y="158" text-anchor="middle">Bundle B</text>
    <text class="ts" x="290" y="176" text-anchor="middle">Integration</text>
  </g>

  <g class="c-teal">
    <rect x="380" y="135" width="140" height="60" rx="8"/>
    <text class="th" x="450" y="158" text-anchor="middle">Bundle C</text>
    <text class="ts" x="450" y="176" text-anchor="middle">Workflow step</text>
  </g>

  <g class="c-gray">
    <rect x="540" y="135" width="80" height="60" rx="8"/>
    <text class="th" x="580" y="158" text-anchor="middle">More...</text>
    <text class="ts" x="580" y="176" text-anchor="middle">Hot pluggable</text>
  </g>

  <line x1="40" y1="240" x2="640" y2="240" class="divider"/>

  <text class="title" x="40" y="270">Why OSGi matters</text>

  <g class="c-blue">
    <rect x="40" y="290" width="190" height="80" rx="8"/>
    <text class="th" x="135" y="316" text-anchor="middle">Hot deploy</text>
    <text class="ts" x="135" y="336" text-anchor="middle">Install, update or</text>
    <text class="ts" x="135" y="350" text-anchor="middle">remove without</text>
    <text class="ts" x="135" y="364" text-anchor="middle">restarting the server</text>
  </g>

  <g class="c-blue">
    <rect x="245" y="290" width="190" height="80" rx="8"/>
    <text class="th" x="340" y="316" text-anchor="middle">Dependency injection</text>
    <text class="ts" x="340" y="336" text-anchor="middle">Services discover</text>
    <text class="ts" x="340" y="350" text-anchor="middle">and consume each</text>
    <text class="ts" x="340" y="364" text-anchor="middle">other cleanly</text>
  </g>

  <g class="c-blue">
    <rect x="450" y="290" width="190" height="80" rx="8"/>
    <text class="th" x="545" y="316" text-anchor="middle">Per-environment config</text>
    <text class="ts" x="545" y="336" text-anchor="middle">Different settings</text>
    <text class="ts" x="545" y="350" text-anchor="middle">for dev, stage</text>
    <text class="ts" x="545" y="364" text-anchor="middle">and production</text>
  </g>

  <text class="ts" x="40" y="410">Result: AEM stays highly dynamic and modular at runtime.</text>

</svg>
