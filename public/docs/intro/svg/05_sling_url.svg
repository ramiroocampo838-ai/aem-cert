<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" width="680" height="460">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Anatomy of a Sling URL</text>
  <text class="subtitle" x="40" y="60">Sling reads the URL piece by piece to decide what to deliver</text>

  <rect x="40" y="90" width="600" height="60" rx="8" fill="#F1EFE8" stroke="#888780"/>
  <text x="60" y="125" font-family="Menlo, Monaco, Consolas, monospace" font-size="18" fill="#2C2C2A">/content/mysite/en</text>
  <text x="282" y="125" font-family="Menlo, Monaco, Consolas, monospace" font-size="18" fill="#D85A30">.mobile</text>
  <text x="354" y="125" font-family="Menlo, Monaco, Consolas, monospace" font-size="18" fill="#1D9E75">.html</text>

  <line x1="170" y1="155" x2="170" y2="185" stroke="#534AB7" stroke-width="0.5"/>
  <line x1="305" y1="155" x2="305" y2="185" stroke="#D85A30" stroke-width="0.5"/>
  <line x1="375" y1="155" x2="375" y2="185" stroke="#1D9E75" stroke-width="0.5"/>

  <g class="c-purple">
    <rect x="40" y="190" width="200" height="68" rx="8"/>
    <text class="th" x="140" y="212" text-anchor="middle">Path</text>
    <text class="ts" x="140" y="232" text-anchor="middle">Where the content lives</text>
    <text class="ts" x="140" y="248" text-anchor="middle">in the repository</text>
  </g>

  <g class="c-coral">
    <rect x="250" y="190" width="180" height="68" rx="8"/>
    <text class="th" x="340" y="212" text-anchor="middle">Selector</text>
    <text class="ts" x="340" y="232" text-anchor="middle">Variant or rendering</text>
    <text class="ts" x="340" y="248" text-anchor="middle">mode</text>
  </g>

  <g class="c-teal">
    <rect x="440" y="190" width="200" height="68" rx="8"/>
    <text class="th" x="540" y="212" text-anchor="middle">Extension</text>
    <text class="ts" x="540" y="232" text-anchor="middle">Output format</text>
    <text class="ts" x="540" y="248" text-anchor="middle">html, json, xml...</text>
  </g>

  <line x1="40" y1="290" x2="640" y2="290" class="divider"/>

  <text class="title" x="40" y="320">Key property: sling:resourceType</text>
  <text class="subtitle" x="40" y="338">Tells AEM which component must render the resource</text>

  <g class="c-gray">
    <rect x="40" y="360" width="140" height="56" rx="8"/>
    <text class="th" x="110" y="382" text-anchor="middle">JCR resource</text>
    <text class="ts" x="110" y="400" text-anchor="middle">Has resourceType</text>
  </g>

  <line x1="190" y1="388" x2="258" y2="388" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="224" y="378" text-anchor="middle">points to</text>

  <g class="c-purple">
    <rect x="270" y="360" width="140" height="56" rx="8"/>
    <text class="th" x="340" y="382" text-anchor="middle">Component</text>
    <text class="ts" x="340" y="400" text-anchor="middle">Lives in /apps</text>
  </g>

  <line x1="420" y1="388" x2="488" y2="388" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="454" y="378" text-anchor="middle">renders</text>

  <g class="c-teal">
    <rect x="500" y="360" width="140" height="56" rx="8"/>
    <text class="th" x="570" y="382" text-anchor="middle">Final HTML</text>
    <text class="ts" x="570" y="400" text-anchor="middle">For the user</text>
  </g>

</svg>
