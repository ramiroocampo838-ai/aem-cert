<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" width="680" height="540">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">AEM architecture</text>
  <text class="subtitle" x="40" y="60">Three layers working together</text>

  <g class="c-purple">
    <rect x="40" y="80" width="280" height="60" rx="8"/>
    <text class="th" x="180" y="108" text-anchor="middle">OSGi</text>
    <text class="ts" x="180" y="126" text-anchor="middle">Services and business logic</text>
  </g>

  <g class="c-teal">
    <rect x="40" y="150" width="280" height="60" rx="8"/>
    <text class="th" x="180" y="178" text-anchor="middle">Apache Sling</text>
    <text class="ts" x="180" y="196" text-anchor="middle">Resolves URLs to content</text>
  </g>

  <g class="c-coral">
    <rect x="40" y="220" width="280" height="60" rx="8"/>
    <text class="th" x="180" y="248" text-anchor="middle">JCR</text>
    <text class="ts" x="180" y="266" text-anchor="middle">Content repository</text>
  </g>

  <text class="ts" x="340" y="115">Top layer</text>
  <text class="ts" x="340" y="185">Middle layer</text>
  <text class="ts" x="340" y="255">Foundation</text>

  <line x1="40" y1="310" x2="640" y2="310" class="divider"/>

  <text class="title" x="40" y="340">Request flow</text>
  <text class="subtitle" x="40" y="358">What happens when a URL arrives</text>

  <g class="c-gray">
    <rect x="40" y="380" width="120" height="56" rx="8"/>
    <text class="th" x="100" y="402" text-anchor="middle">1. Request</text>
    <text class="ts" x="100" y="420" text-anchor="middle">URL arrives</text>
  </g>

  <g class="c-teal">
    <rect x="180" y="380" width="120" height="56" rx="8"/>
    <text class="th" x="240" y="402" text-anchor="middle">2. Sling</text>
    <text class="ts" x="240" y="420" text-anchor="middle">Parses the URL</text>
  </g>

  <g class="c-coral">
    <rect x="320" y="380" width="120" height="56" rx="8"/>
    <text class="th" x="380" y="402" text-anchor="middle">3. JCR</text>
    <text class="ts" x="380" y="420" text-anchor="middle">Locates resource</text>
  </g>

  <g class="c-purple">
    <rect x="460" y="380" width="120" height="56" rx="8"/>
    <text class="th" x="520" y="402" text-anchor="middle">4. OSGi</text>
    <text class="ts" x="520" y="420" text-anchor="middle">Runs the logic</text>
  </g>

  <line x1="160" y1="408" x2="178" y2="408" class="arr" marker-end="url(#arrow)"/>
  <line x1="300" y1="408" x2="318" y2="408" class="arr" marker-end="url(#arrow)"/>
  <line x1="440" y1="408" x2="458" y2="408" class="arr" marker-end="url(#arrow)"/>

  <g class="c-gray">
    <rect x="240" y="470" width="200" height="44" rx="8"/>
    <text class="th" x="340" y="492" text-anchor="middle">5. Response to user</text>
  </g>

  <path d="M520 436 L520 458 L340 458 L340 468" class="arr" marker-end="url(#arrow)"/>

</svg>
