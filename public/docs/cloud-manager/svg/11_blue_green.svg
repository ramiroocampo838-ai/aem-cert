<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" width="680" height="580">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .mono { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #2C2C2A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
    .c-pink text { fill: #72243E; }
    .c-pink .ts { fill: #993556; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Blue/Green deployment</text>
  <text class="subtitle" x="40" y="60">How AEMaaCS achieves zero-downtime deployments</text>

  <text class="th" x="40" y="100">Before the switch</text>

  <g class="c-blue">
    <rect x="80" y="120" width="200" height="100" rx="8"/>
    <text class="th" x="180" y="148" text-anchor="middle">Blue (live)</text>
    <text class="ts" x="180" y="170" text-anchor="middle">Current version</text>
    <text class="ts" x="180" y="188" text-anchor="middle">Receives all traffic</text>
    <text class="ts" x="180" y="206" text-anchor="middle">Users see this</text>
  </g>

  <g class="c-gray">
    <rect x="400" y="120" width="200" height="100" rx="8"/>
    <text class="th" x="500" y="148" text-anchor="middle">Green (idle)</text>
    <text class="ts" x="500" y="170" text-anchor="middle">New version</text>
    <text class="ts" x="500" y="188" text-anchor="middle">Being deployed</text>
    <text class="ts" x="500" y="206" text-anchor="middle">Health checks running</text>
  </g>

  <g class="c-gray">
    <ellipse cx="40" cy="170" rx="22" ry="22"/>
    <text class="th" x="40" y="174" text-anchor="middle">Users</text>
  </g>
  <line x1="62" y1="170" x2="78" y2="170" class="arr" marker-end="url(#arrow)"/>

  <line x1="40" y1="250" x2="640" y2="250" class="divider"/>

  <text class="th" x="40" y="280">After health checks pass</text>

  <g class="c-gray">
    <rect x="80" y="300" width="200" height="100" rx="8"/>
    <text class="th" x="180" y="328" text-anchor="middle">Blue (idle)</text>
    <text class="ts" x="180" y="350" text-anchor="middle">Previous version</text>
    <text class="ts" x="180" y="368" text-anchor="middle">Briefly available</text>
    <text class="ts" x="180" y="386" text-anchor="middle">for rollback</text>
  </g>

  <g class="c-green">
    <rect x="400" y="300" width="200" height="100" rx="8"/>
    <text class="th" x="500" y="328" text-anchor="middle">Green (live)</text>
    <text class="ts" x="500" y="350" text-anchor="middle">New version</text>
    <text class="ts" x="500" y="368" text-anchor="middle">Receives all traffic</text>
    <text class="ts" x="500" y="386" text-anchor="middle">Users see this</text>
  </g>

  <g class="c-gray">
    <ellipse cx="40" cy="350" rx="22" ry="22"/>
    <text class="th" x="40" y="354" text-anchor="middle">Users</text>
  </g>
  <path d="M62 350 L72 350 L72 430 L500 430 L500 402" class="arr" fill="none" marker-end="url(#arrow)"/>

  <line x1="40" y1="470" x2="640" y2="470" class="divider"/>

  <g class="c-coral">
    <rect x="40" y="490" width="600" height="60" rx="8"/>
    <text class="th" x="340" y="514" text-anchor="middle">After every deployment</text>
    <text class="ts" x="340" y="534" text-anchor="middle">Dispatcher cache automatically flushed — users see new content immediately</text>
  </g>

</svg>
