<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" width="680" height="540">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .mono { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #2C2C2A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
    .c-pink text { fill: #72243E; }
    .c-pink .ts { fill: #993556; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Triggers and variables</text>
  <text class="subtitle" x="40" y="60">How pipelines start, and how secrets are passed in</text>

  <text class="th" x="40" y="100">Three ways to trigger a pipeline</text>

  <g class="c-blue">
    <rect x="40" y="120" width="190" height="80" rx="8"/>
    <text class="th" x="135" y="146" text-anchor="middle">Manual</text>
    <text class="ts" x="135" y="166" text-anchor="middle">Click Run in UI</text>
    <text class="ts" x="135" y="182" text-anchor="middle">or call the API</text>
  </g>

  <g class="c-blue">
    <rect x="245" y="120" width="190" height="80" rx="8"/>
    <text class="th" x="340" y="146" text-anchor="middle">On Git Push</text>
    <text class="ts" x="340" y="166" text-anchor="middle">Automatic CI trigger</text>
    <text class="ts" x="340" y="182" text-anchor="middle">on configured branch</text>
  </g>

  <g class="c-blue">
    <rect x="450" y="120" width="190" height="80" rx="8"/>
    <text class="th" x="545" y="146" text-anchor="middle">Scheduled</text>
    <text class="ts" x="545" y="166" text-anchor="middle">Runs at a defined time</text>
    <text class="ts" x="545" y="182" text-anchor="middle">e.g. nightly</text>
  </g>

  <line x1="40" y1="230" x2="640" y2="230" class="divider"/>

  <text class="title" x="40" y="260">Two types of environment variables</text>

  <g class="c-amber">
    <rect x="40" y="280" width="290" height="100" rx="8"/>
    <text class="th" x="185" y="306" text-anchor="middle">Plain text</text>
    <text class="ts" x="185" y="328" text-anchor="middle">Non-sensitive config values</text>
    <text x="185" y="356" text-anchor="middle" class="mono">$[env:VARIABLE_NAME]</text>
  </g>

  <g class="c-red">
    <rect x="350" y="280" width="290" height="100" rx="8"/>
    <text class="th" x="495" y="306" text-anchor="middle">Secrets</text>
    <text class="ts" x="495" y="328" text-anchor="middle">Encrypted, never in logs</text>
    <text x="495" y="356" text-anchor="middle" class="mono">$[secret:SECRET_NAME]</text>
  </g>

  <text class="ts" x="40" y="410">Variables can be scoped per environment (Dev, Stage, Production).</text>

  <line x1="40" y1="430" x2="640" y2="430" class="divider"/>

  <g class="c-teal">
    <rect x="40" y="450" width="600" height="70" rx="8"/>
    <text class="th" x="340" y="476" text-anchor="middle">Pull Request validation</text>
    <text class="ts" x="340" y="496" text-anchor="middle">With Connected Repos: PR opens triggers Code Quality scan</text>
    <text class="ts" x="340" y="512" text-anchor="middle">Results posted back to GitHub, GitLab, or Bitbucket</text>
  </g>

</svg>
