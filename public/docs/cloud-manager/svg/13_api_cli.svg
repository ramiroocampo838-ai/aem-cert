<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" width="680" height="580">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .mono { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #2C2C2A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
    .c-pink text { fill: #72243E; }
    .c-pink .ts { fill: #993556; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Cloud Manager API and CLI</text>
  <text class="subtitle" x="40" y="60">Full programmatic control</text>

  <g class="c-purple">
    <rect x="40" y="90" width="290" height="200" rx="8"/>
    <text class="th" x="185" y="116" text-anchor="middle">REST API</text>
    <text class="ts" x="185" y="138" text-anchor="middle">cloudmanager.adobe.io</text>
    <text class="ts" x="185" y="160" text-anchor="middle">Authenticated via Adobe IMS</text>
    <text class="ts" x="185" y="178" text-anchor="middle">Service Account from</text>
    <text class="ts" x="185" y="196" text-anchor="middle">Adobe Developer Console</text>
    <text class="ts" x="185" y="220" text-anchor="middle">Trigger pipelines, poll status,</text>
    <text class="ts" x="185" y="238" text-anchor="middle">download logs, manage vars,</text>
    <text class="ts" x="185" y="256" text-anchor="middle">create / delete envs</text>
  </g>

  <g class="c-teal">
    <rect x="350" y="90" width="290" height="200" rx="8"/>
    <text class="th" x="495" y="116" text-anchor="middle">Adobe I/O CLI (aio)</text>
    <text x="495" y="142" text-anchor="middle" class="mono">npm install -g</text>
    <text x="495" y="158" text-anchor="middle" class="mono">@adobe/aio-cli</text>
    <text class="ts" x="495" y="180" text-anchor="middle">Plugin:</text>
    <text x="495" y="200" text-anchor="middle" class="mono">aio-cli-plugin-cloudmanager</text>
    <text class="ts" x="495" y="226" text-anchor="middle">List programs and envs,</text>
    <text class="ts" x="495" y="244" text-anchor="middle">trigger pipelines,</text>
    <text class="ts" x="495" y="262" text-anchor="middle">tail logs in real time</text>
  </g>

  <line x1="40" y1="310" x2="640" y2="310" class="divider"/>

  <text class="th" x="40" y="340">Key API use cases</text>

  <g class="c-blue">
    <rect x="40" y="360" width="290" height="60" rx="8"/>
    <text class="th" x="185" y="384" text-anchor="middle">External CI/CD</text>
    <text class="ts" x="185" y="402" text-anchor="middle">Trigger from Jenkins, GH Actions</text>
  </g>

  <g class="c-blue">
    <rect x="350" y="360" width="290" height="60" rx="8"/>
    <text class="th" x="495" y="384" text-anchor="middle">Variable rotation</text>
    <text class="ts" x="495" y="402" text-anchor="middle">Automate secrets refresh</text>
  </g>

  <g class="c-blue">
    <rect x="195" y="430" width="290" height="60" rx="8"/>
    <text class="th" x="340" y="454" text-anchor="middle">Programmatic Go Live</text>
    <text class="ts" x="340" y="472" text-anchor="middle">Approve via the Advance endpoint</text>
  </g>

  <line x1="40" y1="510" x2="640" y2="510" class="divider"/>

  <g class="c-red">
    <rect x="40" y="525" width="600" height="40" rx="8"/>
    <text class="th" x="340" y="550" text-anchor="middle">OAuth Server-to-Server only — JWT credentials removed in January 2025</text>
  </g>

</svg>
