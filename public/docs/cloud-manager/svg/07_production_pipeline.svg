<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 700" width="680" height="700">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .mono { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #2C2C2A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
    .c-pink text { fill: #72243E; }
    .c-pink .ts { fill: #993556; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Production Pipeline: step by step</text>
  <text class="subtitle" x="40" y="60">The primary deployment mechanism — know this flow</text>

  <g class="c-blue">
    <rect x="40" y="90" width="600" height="70" rx="8"/>
    <text class="th" x="340" y="116" text-anchor="middle">1. Build</text>
    <text class="ts" x="340" y="136" text-anchor="middle">Checks out Git branch, runs mvn clean package</text>
    <text class="ts" x="340" y="152" text-anchor="middle">Compiles Java, runs unit tests, measures coverage</text>
  </g>

  <line x1="340" y1="160" x2="340" y2="180" class="arr" marker-end="url(#arrow)"/>

  <g class="c-coral">
    <rect x="40" y="180" width="600" height="70" rx="8"/>
    <text class="th" x="340" y="206" text-anchor="middle">2. Code Quality</text>
    <text class="ts" x="340" y="226" text-anchor="middle">SonarQube static analysis on the build artifact</text>
    <text class="ts" x="340" y="242" text-anchor="middle">Reliability, Security, Maintainability ratings</text>
  </g>

  <line x1="340" y1="250" x2="340" y2="270" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="40" y="270" width="600" height="70" rx="8"/>
    <text class="th" x="340" y="296" text-anchor="middle">3. Deploy to Stage</text>
    <text class="ts" x="340" y="316" text-anchor="middle">Installs the artifact on Stage (Author and Publish)</text>
    <text class="ts" x="340" y="332" text-anchor="middle">Used for integration testing and UAT</text>
  </g>

  <line x1="340" y1="340" x2="340" y2="360" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="40" y="360" width="600" height="70" rx="8"/>
    <text class="th" x="340" y="386" text-anchor="middle">4. Testing</text>
    <text class="ts" x="340" y="406" text-anchor="middle">Product Functional, Custom Functional,</text>
    <text class="ts" x="340" y="422" text-anchor="middle">Custom UI, and Performance Tests</text>
  </g>

  <line x1="340" y1="430" x2="340" y2="450" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="40" y="450" width="600" height="70" rx="8"/>
    <text class="th" x="340" y="476" text-anchor="middle">5. Go Live Approval</text>
    <text class="ts" x="340" y="496" text-anchor="middle">Manual gate — Business Owner or Deployment Manager approves</text>
    <text class="ts" x="340" y="512" text-anchor="middle">Can also be scheduled for a maintenance window</text>
  </g>

  <line x1="340" y1="520" x2="340" y2="540" class="arr" marker-end="url(#arrow)"/>

  <g class="c-green">
    <rect x="40" y="540" width="600" height="80" rx="8"/>
    <text class="th" x="340" y="566" text-anchor="middle">6. Deploy to Production</text>
    <text class="ts" x="340" y="586" text-anchor="middle">Blue/Green deployment — zero downtime</text>
    <text class="ts" x="340" y="602" text-anchor="middle">Dispatcher cache automatically flushed</text>
  </g>

  <text class="ts" x="340" y="660" text-anchor="middle">Each step must succeed before the next begins. A failure halts the pipeline.</text>

</svg>
