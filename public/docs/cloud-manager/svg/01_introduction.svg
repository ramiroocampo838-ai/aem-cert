<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .mono { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #2C2C2A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
    .c-pink text { fill: #72243E; }
    .c-pink .ts { fill: #993556; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Cloud Manager: the big picture</text>
  <text class="subtitle" x="40" y="60">Recap of 100 concepts grouped in 9 categories</text>

  <g class="c-blue">
    <rect x="40" y="90" width="200" height="60" rx="8"/>
    <text class="th" x="140" y="118" text-anchor="middle">AEMaaCS overview</text>
    <text class="ts" x="140" y="136" text-anchor="middle">The platform itself</text>
  </g>

  <g class="c-purple">
    <rect x="260" y="90" width="200" height="60" rx="8"/>
    <text class="th" x="360" y="118" text-anchor="middle">Admin Console</text>
    <text class="ts" x="360" y="136" text-anchor="middle">Identity and access</text>
  </g>

  <g class="c-teal">
    <rect x="480" y="90" width="160" height="60" rx="8"/>
    <text class="th" x="560" y="118" text-anchor="middle">Cloud Manager</text>
    <text class="ts" x="560" y="136" text-anchor="middle">CI/CD hub</text>
  </g>

  <g class="c-amber">
    <rect x="40" y="170" width="200" height="60" rx="8"/>
    <text class="th" x="140" y="198" text-anchor="middle">Roles and pipelines</text>
    <text class="ts" x="140" y="216" text-anchor="middle">Who does what</text>
  </g>

  <g class="c-coral">
    <rect x="260" y="170" width="200" height="60" rx="8"/>
    <text class="th" x="360" y="198" text-anchor="middle">Code quality and tests</text>
    <text class="ts" x="360" y="216" text-anchor="middle">Quality gates</text>
  </g>

  <g class="c-green">
    <rect x="480" y="170" width="160" height="60" rx="8"/>
    <text class="th" x="560" y="198" text-anchor="middle">Blue/Green</text>
    <text class="ts" x="560" y="216" text-anchor="middle">Zero downtime</text>
  </g>

  <g class="c-pink">
    <rect x="40" y="250" width="200" height="60" rx="8"/>
    <text class="th" x="140" y="278" text-anchor="middle">Monitoring and logs</text>
    <text class="ts" x="140" y="296" text-anchor="middle">Observability</text>
  </g>

  <g class="c-gray">
    <rect x="260" y="250" width="200" height="60" rx="8"/>
    <text class="th" x="360" y="278" text-anchor="middle">API and CLI</text>
    <text class="ts" x="360" y="296" text-anchor="middle">Programmatic control</text>
  </g>

  <g class="c-blue">
    <rect x="480" y="250" width="160" height="60" rx="8"/>
    <text class="th" x="560" y="278" text-anchor="middle">Closing</text>
    <text class="ts" x="560" y="296" text-anchor="middle">Connect the dots</text>
  </g>

  <text class="ts" x="340" y="370" text-anchor="middle">Goal: connect all categories and see the full picture before the exam</text>

</svg>
