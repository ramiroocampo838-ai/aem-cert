<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="680" height="520">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .mono { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #2C2C2A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
    .c-pink text { fill: #72243E; }
    .c-pink .ts { fill: #993556; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">The four Cloud Manager roles</text>
  <text class="subtitle" x="40" y="60">All assigned via product profiles in the Adobe Admin Console</text>

  <g class="c-purple">
    <rect x="40" y="90" width="290" height="180" rx="8"/>
    <text class="th" x="185" y="116" text-anchor="middle">Business Owner</text>
    <text class="ts" x="185" y="138" text-anchor="middle">Highest governance role</text>
    <text class="ts" x="185" y="160" text-anchor="middle">Creates programs</text>
    <text class="ts" x="185" y="178" text-anchor="middle">Sets production KPI targets</text>
    <text class="ts" x="185" y="196" text-anchor="middle">Approves Go Live</text>
    <text class="ts" x="185" y="220" text-anchor="middle">Must be assigned</text>
    <text class="ts" x="185" y="238" text-anchor="middle">in Admin Console</text>
  </g>

  <g class="c-blue">
    <rect x="350" y="90" width="290" height="180" rx="8"/>
    <text class="th" x="495" y="116" text-anchor="middle">Program Manager</text>
    <text class="ts" x="495" y="138" text-anchor="middle">Coordination and planning</text>
    <text class="ts" x="495" y="160" text-anchor="middle">Manages timelines</text>
    <text class="ts" x="495" y="178" text-anchor="middle">Cross-team visibility</text>
    <text class="ts" x="495" y="220" text-anchor="middle">No pipeline configuration</text>
    <text class="ts" x="495" y="238" text-anchor="middle">No deployment rights</text>
  </g>

  <g class="c-amber">
    <rect x="40" y="290" width="290" height="180" rx="8"/>
    <text class="th" x="185" y="316" text-anchor="middle">Deployment Manager</text>
    <text class="ts" x="185" y="338" text-anchor="middle">Configures pipelines</text>
    <text class="ts" x="185" y="356" text-anchor="middle">Triggers production runs</text>
    <text class="ts" x="185" y="378" text-anchor="middle">Manages env variables</text>
    <text class="ts" x="185" y="420" text-anchor="middle">Can override Important</text>
    <text class="ts" x="185" y="438" text-anchor="middle">quality gate failures</text>
  </g>

  <g class="c-teal">
    <rect x="350" y="290" width="290" height="180" rx="8"/>
    <text class="th" x="495" y="316" text-anchor="middle">Developer</text>
    <text class="ts" x="495" y="338" text-anchor="middle">Access to logs and</text>
    <text class="ts" x="495" y="356" text-anchor="middle">Developer Console</text>
    <text class="ts" x="495" y="378" text-anchor="middle">Triggers non-prod pipelines</text>
    <text class="ts" x="495" y="420" text-anchor="middle">Cannot trigger production</text>
    <text class="ts" x="495" y="438" text-anchor="middle">Cannot manage program</text>
  </g>

  <text class="ts" x="340" y="500" text-anchor="middle">Note: Cloud Manager roles do NOT automatically grant AEM Author access — those are separate.</text>

</svg>
