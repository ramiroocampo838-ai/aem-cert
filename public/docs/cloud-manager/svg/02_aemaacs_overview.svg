<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" width="680" height="540">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .mono { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #2C2C2A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
    .c-pink text { fill: #72243E; }
    .c-pink .ts { fill: #993556; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">AEMaaCS at a glance</text>
  <text class="subtitle" x="40" y="60">Adobe's fully managed, cloud-native CMS</text>

  <text class="th" x="40" y="100">Key traits</text>

  <g class="c-blue">
    <rect x="40" y="120" width="145" height="80" rx="8"/>
    <text class="th" x="112" y="146" text-anchor="middle">Always latest</text>
    <text class="ts" x="112" y="166" text-anchor="middle">Continuous</text>
    <text class="ts" x="112" y="182" text-anchor="middle">updates by Adobe</text>
  </g>

  <g class="c-blue">
    <rect x="195" y="120" width="145" height="80" rx="8"/>
    <text class="th" x="267" y="146" text-anchor="middle">Auto-scaling</text>
    <text class="ts" x="267" y="166" text-anchor="middle">Resources adjust</text>
    <text class="ts" x="267" y="182" text-anchor="middle">to traffic</text>
  </g>

  <g class="c-blue">
    <rect x="350" y="120" width="145" height="80" rx="8"/>
    <text class="th" x="422" y="146" text-anchor="middle">Built-in CDN</text>
    <text class="ts" x="422" y="166" text-anchor="middle">Edge nodes near</text>
    <text class="ts" x="422" y="182" text-anchor="middle">the user</text>
  </g>

  <g class="c-blue">
    <rect x="505" y="120" width="135" height="80" rx="8"/>
    <text class="th" x="572" y="146" text-anchor="middle">Containers</text>
    <text class="ts" x="572" y="166" text-anchor="middle">Docker, not</text>
    <text class="ts" x="572" y="182" text-anchor="middle">fixed servers</text>
  </g>

  <line x1="40" y1="230" x2="640" y2="230" class="divider"/>

  <text class="title" x="40" y="260">Two architecture layers</text>

  <g class="c-red">
    <rect x="40" y="280" width="290" height="100" rx="8"/>
    <text class="th" x="185" y="306" text-anchor="middle">Immutable layer</text>
    <text class="ts" x="185" y="328" text-anchor="middle">/apps and /libs</text>
    <text class="ts" x="185" y="346" text-anchor="middle">Read-only at runtime</text>
    <text class="ts" x="185" y="364" text-anchor="middle">Changes via pipeline only</text>
  </g>

  <g class="c-coral">
    <rect x="350" y="280" width="290" height="100" rx="8"/>
    <text class="th" x="495" y="306" text-anchor="middle">Mutable layer</text>
    <text class="ts" x="495" y="328" text-anchor="middle">/content and /conf</text>
    <text class="ts" x="495" y="346" text-anchor="middle">Survive deployments</text>
    <text class="ts" x="495" y="364" text-anchor="middle">Stored in Azure Blob Storage</text>
  </g>

  <line x1="40" y1="410" x2="640" y2="410" class="divider"/>

  <text class="title" x="40" y="440">Other key concepts</text>

  <g class="c-amber">
    <rect x="40" y="460" width="140" height="60" rx="8"/>
    <text class="th" x="110" y="484" text-anchor="middle">SCD</text>
    <text class="ts" x="110" y="502" text-anchor="middle">Replaces replication</text>
  </g>

  <g class="c-amber">
    <rect x="190" y="460" width="140" height="60" rx="8"/>
    <text class="th" x="260" y="484" text-anchor="middle">Asset Microservices</text>
    <text class="ts" x="260" y="502" text-anchor="middle">Renditions at scale</text>
  </g>

  <g class="c-amber">
    <rect x="340" y="460" width="140" height="60" rx="8"/>
    <text class="th" x="410" y="484" text-anchor="middle">RDE</text>
    <text class="ts" x="410" y="502" text-anchor="middle">Instant code deploys</text>
  </g>

  <g class="c-amber">
    <rect x="490" y="460" width="150" height="60" rx="8"/>
    <text class="th" x="565" y="484" text-anchor="middle">CAM</text>
    <text class="ts" x="565" y="502" text-anchor="middle">Migration helper</text>
  </g>

</svg>
