<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" width="680" height="540">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .mono { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #2C2C2A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
    .c-pink text { fill: #72243E; }
    .c-pink .ts { fill: #993556; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Pipeline types</text>
  <text class="subtitle" x="40" y="60">Choosing the right one matters for speed and scope</text>

  <g class="c-purple">
    <rect x="40" y="90" width="290" height="100" rx="8"/>
    <text class="th" x="185" y="116" text-anchor="middle">Full Stack Pipeline</text>
    <text class="ts" x="185" y="138" text-anchor="middle">Builds and deploys everything</text>
    <text class="ts" x="185" y="156" text-anchor="middle">OSGi, content, Dispatcher,</text>
    <text class="ts" x="185" y="172" text-anchor="middle">front-end assets</text>
  </g>

  <g class="c-teal">
    <rect x="350" y="90" width="290" height="100" rx="8"/>
    <text class="th" x="495" y="116" text-anchor="middle">Front End Pipeline</text>
    <text class="ts" x="495" y="138" text-anchor="middle">Only compiled CSS and JS</text>
    <text class="ts" x="495" y="156" text-anchor="middle">npm/webpack build</text>
    <text class="ts" x="495" y="172" text-anchor="middle">Skips Maven backend</text>
  </g>

  <g class="c-amber">
    <rect x="40" y="210" width="290" height="100" rx="8"/>
    <text class="th" x="185" y="236" text-anchor="middle">Config Pipeline</text>
    <text class="ts" x="185" y="258" text-anchor="middle">Only configuration files</text>
    <text class="ts" x="185" y="276" text-anchor="middle">OSGi configs, CDN rules,</text>
    <text class="ts" x="185" y="292" text-anchor="middle">log forwarding settings</text>
  </g>

  <g class="c-coral">
    <rect x="350" y="210" width="290" height="100" rx="8"/>
    <text class="th" x="495" y="236" text-anchor="middle">Web Tier Config</text>
    <text class="ts" x="495" y="258" text-anchor="middle">Specifically for Dispatcher</text>
    <text class="ts" x="495" y="276" text-anchor="middle">and Apache HTTP</text>
    <text class="ts" x="495" y="292" text-anchor="middle">configuration changes</text>
  </g>

  <g class="c-blue">
    <rect x="195" y="330" width="290" height="100" rx="8"/>
    <text class="th" x="340" y="356" text-anchor="middle">Code Quality Pipeline</text>
    <text class="ts" x="340" y="378" text-anchor="middle">SonarQube analysis only</text>
    <text class="ts" x="340" y="396" text-anchor="middle">No deployment</text>
    <text class="ts" x="340" y="412" text-anchor="middle">Validates feature branches / PRs</text>
  </g>

  <line x1="40" y1="450" x2="640" y2="450" class="divider"/>

  <g class="c-red">
    <rect x="40" y="470" width="600" height="50" rx="8"/>
    <text class="th" x="340" y="492" text-anchor="middle">Important constraint</text>
    <text class="ts" x="340" y="510" text-anchor="middle">Each program: exactly ONE Production Pipeline. Multiple Non-Prod, Config, FE, and CQ allowed.</text>
  </g>

</svg>
