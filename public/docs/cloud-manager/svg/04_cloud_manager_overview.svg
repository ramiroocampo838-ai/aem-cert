<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" width="680" height="540">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .mono { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #2C2C2A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
    .c-pink text { fill: #72243E; }
    .c-pink .ts { fill: #993556; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Cloud Manager: the operational hub</text>
  <text class="subtitle" x="40" y="60">CI/CD and operations for AEMaaCS</text>

  <g class="c-teal">
    <rect x="40" y="90" width="145" height="70" rx="8"/>
    <text class="th" x="112" y="116" text-anchor="middle">Deploy code</text>
    <text class="ts" x="112" y="136" text-anchor="middle">Pipelines</text>
  </g>

  <g class="c-teal">
    <rect x="195" y="90" width="145" height="70" rx="8"/>
    <text class="th" x="267" y="116" text-anchor="middle">Manage envs</text>
    <text class="ts" x="267" y="136" text-anchor="middle">Provisioning</text>
  </g>

  <g class="c-teal">
    <rect x="350" y="90" width="145" height="70" rx="8"/>
    <text class="th" x="422" y="116" text-anchor="middle">Monitor</text>
    <text class="ts" x="422" y="136" text-anchor="middle">Metrics and alerts</text>
  </g>

  <g class="c-teal">
    <rect x="505" y="90" width="135" height="70" rx="8"/>
    <text class="th" x="572" y="116" text-anchor="middle">Logs</text>
    <text class="ts" x="572" y="136" text-anchor="middle">Dev tools</text>
  </g>

  <line x1="40" y1="190" x2="640" y2="190" class="divider"/>

  <text class="title" x="40" y="220">Programs: the top-level container</text>
  <text class="subtitle" x="40" y="238">Groups environments, pipelines, Git repo, and user access</text>

  <g class="c-blue">
    <rect x="40" y="260" width="290" height="130" rx="8"/>
    <text class="th" x="185" y="286" text-anchor="middle">Sandbox program</text>
    <text class="ts" x="185" y="308" text-anchor="middle">Learning, demos, PoCs</text>
    <text class="ts" x="185" y="326" text-anchor="middle">No production environment</text>
    <text class="ts" x="185" y="344" text-anchor="middle">No SLA</text>
    <text class="ts" x="185" y="362" text-anchor="middle">Auto-hibernates after</text>
    <text class="ts" x="185" y="380" text-anchor="middle">~8 hours of inactivity</text>
  </g>

  <g class="c-purple">
    <rect x="350" y="260" width="290" height="130" rx="8"/>
    <text class="th" x="495" y="286" text-anchor="middle">Production program</text>
    <text class="ts" x="495" y="308" text-anchor="middle">Real business workloads</text>
    <text class="ts" x="495" y="326" text-anchor="middle">Full capacity</text>
    <text class="ts" x="495" y="362" text-anchor="middle">Adobe SLA-backed</text>
  </g>

  <line x1="40" y1="420" x2="640" y2="420" class="divider"/>

  <text class="title" x="40" y="450">Git repositories</text>

  <g class="c-amber">
    <rect x="40" y="470" width="290" height="56" rx="8"/>
    <text class="th" x="185" y="492" text-anchor="middle">Adobe-hosted Git</text>
    <text class="ts" x="185" y="510" text-anchor="middle">Built-in, one per program</text>
  </g>

  <g class="c-amber">
    <rect x="350" y="470" width="290" height="56" rx="8"/>
    <text class="th" x="495" y="492" text-anchor="middle">External repos</text>
    <text class="ts" x="495" y="510" text-anchor="middle">GitHub, GitLab, Bitbucket</text>
  </g>

</svg>
