<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" width="680" height="540">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .mono { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #2C2C2A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
    .c-pink text { fill: #72243E; }
    .c-pink .ts { fill: #993556; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Testing in pipelines</text>
  <text class="subtitle" x="40" y="60">Four test types run after Stage deployment</text>

  <g class="c-purple">
    <rect x="40" y="90" width="290" height="120" rx="8"/>
    <text class="th" x="185" y="116" text-anchor="middle">Product Functional</text>
    <text class="ts" x="185" y="138" text-anchor="middle">Maintained by Adobe</text>
    <text class="ts" x="185" y="158" text-anchor="middle">Verifies core AEM features</text>
    <text class="ts" x="185" y="176" text-anchor="middle">work after your code</text>
    <text class="ts" x="185" y="196" text-anchor="middle">Always runs automatically</text>
  </g>

  <g class="c-blue">
    <rect x="350" y="90" width="290" height="120" rx="8"/>
    <text class="th" x="495" y="116" text-anchor="middle">Custom Functional</text>
    <text class="ts" x="495" y="138" text-anchor="middle">Written by your team</text>
    <text class="ts" x="495" y="158" text-anchor="middle">Packaged as Docker images</text>
    <text class="ts" x="495" y="176" text-anchor="middle">HTTP/REST tests against</text>
    <text class="ts" x="495" y="196" text-anchor="middle">deployed environment</text>
  </g>

  <g class="c-teal">
    <rect x="40" y="230" width="290" height="120" rx="8"/>
    <text class="th" x="185" y="256" text-anchor="middle">Custom UI</text>
    <text class="ts" x="185" y="278" text-anchor="middle">Browser automation</text>
    <text class="ts" x="185" y="298" text-anchor="middle">Selenium, Cypress,</text>
    <text class="ts" x="185" y="316" text-anchor="middle">Playwright, WebdriverIO</text>
    <text class="ts" x="185" y="336" text-anchor="middle">Selenium Grid provided</text>
  </g>

  <g class="c-coral">
    <rect x="350" y="230" width="290" height="120" rx="8"/>
    <text class="th" x="495" y="256" text-anchor="middle">Performance</text>
    <text class="ts" x="495" y="278" text-anchor="middle">Simulates real traffic</text>
    <text class="ts" x="495" y="298" text-anchor="middle">Response time, error rate,</text>
    <text class="ts" x="495" y="316" text-anchor="middle">CPU, page views/min</text>
    <text class="ts" x="495" y="336" text-anchor="middle">vs Business Owner KPIs</text>
  </g>

  <line x1="40" y1="380" x2="640" y2="380" class="divider"/>

  <g class="c-red">
    <rect x="40" y="400" width="600" height="100" rx="8"/>
    <text class="th" x="340" y="426" text-anchor="middle">If any step fails</text>
    <text class="ts" x="340" y="450" text-anchor="middle">Pipeline stops at that step</text>
    <text class="ts" x="340" y="468" text-anchor="middle">Previously deployed version stays active</text>
    <text class="ts" x="340" y="486" text-anchor="middle">Team must fix and trigger a new run</text>
  </g>

</svg>
