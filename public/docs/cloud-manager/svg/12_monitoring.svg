<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" width="680" height="620">

  <style>
    .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #2C2C2A; }
    .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .mono { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; fill: #2C2C2A; }

    .c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #444441; }

    .c-red rect, .c-red ellipse, .c-red circle { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }

    .c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-green rect, .c-green ellipse, .c-green circle { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
    .c-pink text { fill: #72243E; }
    .c-pink .ts { fill: #993556; }

    .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .divider { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
    rect, ellipse, circle { stroke-width: 0.5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


  <text class="title" x="40" y="40">Monitoring and observability</text>
  <text class="subtitle" x="40" y="60">Tools available to track AEMaaCS health</text>

  <g class="c-blue">
    <rect x="40" y="90" width="290" height="80" rx="8"/>
    <text class="th" x="185" y="116" text-anchor="middle">Built-in dashboards</text>
    <text class="ts" x="185" y="138" text-anchor="middle">CPU, memory, disk</text>
    <text class="ts" x="185" y="156" text-anchor="middle">HTTP rate, errors, response time</text>
  </g>

  <g class="c-purple">
    <rect x="350" y="90" width="290" height="80" rx="8"/>
    <text class="th" x="495" y="116" text-anchor="middle">AEM Developer Console</text>
    <text class="ts" x="495" y="138" text-anchor="middle">OSGi state, Sling bindings,</text>
    <text class="ts" x="495" y="156" text-anchor="middle">request logs, query debug</text>
  </g>

  <line x1="40" y1="190" x2="640" y2="190" class="divider"/>

  <text class="th" x="40" y="220">Log access options</text>

  <g class="c-amber">
    <rect x="40" y="240" width="145" height="80" rx="8"/>
    <text class="th" x="112" y="264" text-anchor="middle">CM UI</text>
    <text class="ts" x="112" y="284" text-anchor="middle">Download per env,</text>
    <text class="ts" x="112" y="300" text-anchor="middle">service, date</text>
  </g>

  <g class="c-amber">
    <rect x="195" y="240" width="145" height="80" rx="8"/>
    <text class="th" x="267" y="264" text-anchor="middle">CLI / API</text>
    <text class="ts" x="267" y="284" text-anchor="middle">Programmatic</text>
    <text class="ts" x="267" y="300" text-anchor="middle">access</text>
  </g>

  <g class="c-amber">
    <rect x="350" y="240" width="145" height="80" rx="8"/>
    <text class="th" x="422" y="264" text-anchor="middle">Dev Console</text>
    <text class="ts" x="422" y="284" text-anchor="middle">Recent logs,</text>
    <text class="ts" x="422" y="300" text-anchor="middle">interactive view</text>
  </g>

  <g class="c-amber">
    <rect x="505" y="240" width="135" height="80" rx="8"/>
    <text class="th" x="572" y="264" text-anchor="middle">Forwarding</text>
    <text class="ts" x="572" y="284" text-anchor="middle">Splunk, Datadog,</text>
    <text class="ts" x="572" y="300" text-anchor="middle">Azure, S3</text>
  </g>

  <line x1="40" y1="340" x2="640" y2="340" class="divider"/>

  <text class="th" x="40" y="370">Alerts and audits</text>

  <g class="c-coral">
    <rect x="40" y="390" width="290" height="80" rx="8"/>
    <text class="th" x="185" y="416" text-anchor="middle">Custom Alerts</text>
    <text class="ts" x="185" y="438" text-anchor="middle">Notify when KPI thresholds</text>
    <text class="ts" x="185" y="456" text-anchor="middle">are breached</text>
  </g>

  <g class="c-teal">
    <rect x="350" y="390" width="290" height="80" rx="8"/>
    <text class="th" x="495" y="416" text-anchor="middle">Experience Audit</text>
    <text class="ts" x="495" y="438" text-anchor="middle">Lighthouse on Stage:</text>
    <text class="ts" x="495" y="456" text-anchor="middle">perf, SEO, A11y, BP</text>
  </g>

  <g class="c-green">
    <rect x="195" y="490" width="290" height="80" rx="8"/>
    <text class="th" x="340" y="516" text-anchor="middle">New Relic Integration</text>
    <text class="ts" x="340" y="538" text-anchor="middle">APM: JVM heap, GC,</text>
    <text class="ts" x="340" y="556" text-anchor="middle">Sling traces, errors</text>
  </g>

</svg>
